[pytest]
testpaths = test_case
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s  %(filename)s:%(lineno)d  [%(levelname)-5s]  %(message)s
log_cli_date_format = %H:%M:%S
addopts =
    -v
    --tb=short
markers =
    smoke: 冒烟测试（核心流程）
    slow: 耗时较长的测试
    login_related: 与登录相关的测试
