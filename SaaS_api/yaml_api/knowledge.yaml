create_kb_folder:
  method: POST
  url: sa/brand/kb/folder/create
  headers:
    Content-Type: application/json
  json:
    baseParam:
      merchantId: $merchantId
    data:
      brandId: $brandId
      scopeType: BRAND
      scopeId: $scopeId
      knowledgeBaseId: $knowledgeBaseId
      name: $name
