get_prompts_page_list:
  method: POST
  url: /sa/brand/prompts/pageList
  headers:
    Content-Type: application/json
  json:
    baseParam:
      merchantId: $merchantId
    data:
      topicId: null
      status: null
      endTime: ~
      pageNum: 1
      pageSize: 20
      brandId: $brandId

prompts_save:
  method: POST
  url: sa/brand/prompts/save
  headers:
    Content-Type: application/json
  json:
    baseParam:
      merchantId: $merchantId
    data:
      topicId: $topicId
      prompts: $prompts
      brandId: $brandId

topics_change_status:
  method: POST
  url: sa/brand/topics/changeStatus
  headers:
    Content-Type: application/json
  json:
    baseParam:
      merchantId: $merchantId
    data:
      topicId: $topicId
      status: $status
      brandId: $brandId

topics_delete:
  method: POST
  url: sa/brand/topics/delete
  headers:
    Content-Type: application/json
  json:
    baseParam:
      merchantId: $merchantId
    data:
      topicIds: $topicIds
      brandId: $brandId

